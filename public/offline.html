<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LoveYou – Ngoại tuyến</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        font-family: system-ui, sans-serif;
        background: #fff1f2;
        color: #334155;
        text-align: center;
        padding: 2rem;
        gap: 0.75rem;
      }
      .heart {
        font-size: 3.5rem;
        display: block;
        animation: beat 1.5s ease-in-out infinite;
        margin-bottom: 0.5rem;
      }
      @keyframes beat {
        0%,
        100% {
          transform: scale(1);
        }
        50% {
          transform: scale(1.2);
        }
      }
      h1 {
        font-size: 1.5rem;
        font-weight: 700;
        color: #f43f5e;
      }
      p {
        font-size: 0.9rem;
        color: #64748b;
        line-height: 1.6;
      }
      button {
        margin-top: 1.25rem;
        padding: 0.75rem 2.25rem;
        background: #f43f5e;
        color: white;
        border: none;
        border-radius: 999px;
        font-size: 0.9rem;
        font-weight: 600;
        cursor: pointer;
        transition: background 0.2s;
      }
      button:hover {
        background: #e11d48;
      }
    </style>
  </head>
  <body>
    <span class="heart">💕</span>
    <h1>Đang ngoại tuyến</h1>
    <p>Không có kết nối internet.<br />Kiểm tra lại và thử lại nhé!</p>
    <button onclick="location.reload()">Thử lại</button>
  </body>
</html>
